# Alembic Configuration — AutoForge
#
# Run migrations:
#   alembic upgrade head
#   alembic revision --autogenerate -m "description"
#
# In Docker, DATABASE_URL env var is used automatically.

[alembic]
script_location = alembic
prepend_sys_path = .

# This is overridden at runtime by env.py using settings.DATABASE_URL
sqlalchemy.url = postgresql://autoforge:autoforge@localhost:5432/autoforge

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
