name: AutoForge CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DEMO_MODE: "true"

jobs:
  # ─── Backend Tests ─────────────────────────────────
  backend-tests:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-full.txt
          pip install pytest-cov

      - name: Configure PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/backend" >> $GITHUB_ENV

      - name: Run unit tests
        run: |
          pytest backend/tests/ \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend

  # ─── Backend Lint & Type Check ────────────────────
  backend-lint:
    name: "🔍 Backend Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r backend/requirements-full.txt

      - name: Ruff check
        run: ruff check backend/ --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/
        continue-on-error: true

      - name: Mypy type check
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true

  # ─── Dashboard Build ───────────────────────────────
  dashboard-build:
    name: "🎨 Dashboard Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: TypeScript check
        working-directory: dashboard
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

  # ─── Integration Tests ────────────────────────────
  integration:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-tests, dashboard-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-full.txt

      - name: Configure PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/backend" >> $GITHUB_ENV

      - name: Start backend server
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run integration tests
        run: bash test_autoforge.sh

  # ─── Docker Build ──────────────────────────────────
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: autoforge-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          tags: autoforge-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Scan ────────────────────────────────
  security-scan:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements-full.txt
        continue-on-error: true

      - name: Safety check
        run: safety check -r backend/requirements-full.txt --output text
        continue-on-error: true
